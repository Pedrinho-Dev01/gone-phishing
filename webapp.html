<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gone Phishing — Spam Detection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap">

  <header>
    <h1>Gone<br /><span>Phishing.</span></h1>
  </header>

  <!-- API URL hint -->
  <div class="api-hint">
    <span>API</span>
    <code id="api-url">http://localhost:8000/predict/eml</code>
    <button class="copy-btn" onclick="copyAPI()" title="Copy URL">⎘</button>
  </div>

  <!-- Error banner -->
  <div class="error-banner" id="error-banner"></div>

  <!-- Input -->
  <div class="input-card" id="drop-zone">
    <div class="input-label">
      <span>Email file</span>
      <span id="file-name">No file selected</span>
    </div>
    <div class="drop-area" id="drop-area" onclick="document.getElementById('eml-input').click()">
      <div class="drop-icon">📨</div>
      <p class="drop-primary">Drop your <strong>.eml</strong> file here</p>
      <p class="drop-secondary">or click to browse</p>
    </div>
    <input type="file" id="eml-input" accept=".eml" style="display:none" />
    <div class="btn-row">
      <button class="btn-scan" id="scan-btn" onclick="runScan()">
        <div class="spinner" id="spinner"></div>
        <span id="btn-label">Scan email</span>
      </button>
      <button class="btn-clear" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <!-- Result -->
  <div class="result-card" id="result-card">
    <div class="result-header">
      <div class="verdict-icon" id="verdict-icon">🛡️</div>
      <div class="verdict-label">
        <h2 id="verdict-text">—</h2>
        <p id="verdict-sub">—</p>
      </div>
      <div class="prob-big" id="prob-big">—</div>
    </div>
    <div class="prob-bar-wrap">
      <div class="prob-bar-track">
        <div class="prob-bar-fill" id="prob-bar"></div>
      </div>
      <div class="prob-bar-labels">
        <span>Ham</span>
        <span id="threshold-label">Threshold: 35%</span>
        <span>Spam</span>
      </div>
    </div>
    <div class="breakdown" id="breakdown">
      <div class="model-row-item" id="roberta-item">
        <div class="m-name">RoBERTa-Large</div>
        <div class="m-prob" id="roberta-prob">—</div>
        <div class="m-verdict" id="roberta-verdict">—</div>
      </div>
      <div class="model-row-item" id="electra-item">
        <div class="m-name">ELECTRA-Large</div>
        <div class="m-prob" id="electra-prob">—</div>
        <div class="m-verdict" id="electra-verdict">—</div>
      </div>
    </div>
  </div>

  <footer>
    Gone Phishing <span>·</span> RoBERTa F1 0.917 <span>·</span> ELECTRA F1 0.905 <span>·</span> .eml input
  </footer>

</div>
<script src="app.js"></script>
</body>
</html>
